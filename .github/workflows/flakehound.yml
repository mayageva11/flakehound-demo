name: flakehound

# Runs the Flaky Shop suite on a schedule (and on demand), appends the run to
# the history, re-analyzes the whole history with flakehound, and republishes
# the dashboard. The report is persisted by committing it back to the repo, so
# each run's report becomes the next run's --baseline.
on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch: {} # manual trigger — for live demos

# Never let two runs push at once; queue instead of cancel so no run is lost.
concurrency:
  group: flakehound-history
  cancel-in-progress: false

permissions:
  contents: write # commit history + refreshed report back to the repo
  issues: write # `flakehound quarantine` files/closes one issue per quarantined test

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history so we can commit)
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Prepare history folder for this run
        id: run
        run: |
          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SAFE_TS="$(date -u +%Y-%m-%dT%H-%M-%SZ)"
          SHORT_SHA="${GITHUB_SHA::7}"
          DIR="history/${SHORT_SHA}_${SAFE_TS}"
          mkdir -p "$DIR"
          echo "timestamp=$TS" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          # Metadata sidecar — the best rung of flakehound's resolution chain.
          cat > "$DIR/junit.meta.json" <<JSON
          {
            "commitSha": "${GITHUB_SHA}",
            "timestamp": "${TS}",
            "runnerId": "${RUNNER_NAME}"
          }
          JSON

      - name: Run the Flaky Shop suite against the live site
        # Failures are expected — they are the data. Never fail the job here.
        # SHOP_URL defaults to the GitHub Pages-hosted shop; override it with a
        # repo Variable if you fork/rename. If it resolves empty,
        # playwright.config.ts boots a local static server in the runner instead.
        env:
          SHOP_URL: ${{ vars.SHOP_URL || 'https://mayageva11.github.io/flakehound-demo/shop/' }}
          JUNIT_OUTPUT: ${{ steps.run.outputs.dir }}/junit.xml
        run: npx playwright test || true

      - name: Analyze the accumulated history with flakehound (--no-ai)
        # Exit 1 (a new regression was found) is informational for this demo —
        # surfacing it on the dashboard is the whole point. Fail only on exit 2
        # (a genuine tool error).
        run: |
          set +e
          npm run analyze
          rc=$?
          if [ "$rc" -eq 2 ]; then exit 2; fi
          echo "flakehound exit code: $rc"

      - name: Quarantine flaky tests / release stable ones (apply + GitHub issues)
        # `flakehound quarantine --apply` tags newly high-confidence flaky tests
        # in their spec files (and files an issue each), releases tests that hit
        # stableRunsToRelease clean passes (closing their issues), and syncs the
        # state file into docs/ for the dashboard. It edits files but never
        # commits — the commit step below carries everything.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/quarantine.mjs

      - name: Prune old run folders (keep the seed + newest 80 real runs)
        run: |
          ls -d history/*/ 2>/dev/null | grep -v '/seed-' | sort | head -n -80 | xargs -r rm -rf
          echo "history now holds $(ls -d history/*/ | wc -l) run folder(s)"

      - name: Commit refreshed report + history
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add history docs tests
          if [ -f flakehound.quarantine.json ]; then git add flakehound.quarantine.json; fi
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "flakehound: run ${GITHUB_RUN_NUMBER} on ${GITHUB_SHA::7} [skip ci]"
            git push
          fi
