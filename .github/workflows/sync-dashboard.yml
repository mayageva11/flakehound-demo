name: sync-dashboard

# Instant dashboard refresh — the fast lane next to the 6-hourly pipeline.
# docs/index.html is a generated artifact whose canonical source lives in the
# flakehound repo; this workflow re-fetches it in seconds (no Playwright, no
# analysis) so dashboard changes land on the live demo without waiting for a
# scheduled run. Triggered by:
#   - repository_dispatch "dashboard-updated" — sent by flakehound's
#     notify-demo.yml whenever docs/index.html changes on its main branch
#     (requires the DEMO_DISPATCH_TOKEN secret over there);
#   - workflow_dispatch — the manual button, works with zero setup.
on:
  repository_dispatch:
    types: [dashboard-updated]
  workflow_dispatch: {}

# Share the history pipeline's group so a sync never races its push.
concurrency:
  group: flakehound-history
  cancel-in-progress: false

permissions:
  contents: write # commit the refreshed docs/index.html

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync dashboard from flakehound
        run: node scripts/sync-dashboard.mjs

      - name: Commit the refreshed dashboard
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "dashboard already up to date — nothing to commit"
          else
            git commit -m "sync dashboard from flakehound [skip ci]"
            git push
          fi
